<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Ofertas Automotivas | Máquina em Dia</title>
    <style>
        :root { --bg: #050505; --card: #121212; --border: #252525; --yellow: #ffcc00; --text: #aaa; --green: #00c853; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; min-height: 100vh; background: var(--card); padding-bottom: 90px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid var(--border); background: #000; }
        header h1 { color: var(--yellow); font-size: 1.4rem; }
        .timer { background: #1a0000; text-align: center; padding: 10px; color: #ff4444; font-weight: bold; font-size: 0.85rem; }
        .card { background: #1a1a1a; margin: 15px 12px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--green); color: #fff; padding: 5px 10px; font-size: 0.65rem; border-radius: 4px; font-weight: bold; z-index: 10; }
        .card img { width: 100%; height: 200px; object-fit: contain; background: #fff; border-bottom: 2px solid var(--yellow); }
        .card-body { padding: 15px; }
        .title { font-size: 1rem; font-weight: bold; margin-bottom: 8px; color: #efefef; }
        .price { color: var(--yellow); font-size: 1.4rem; font-weight: 900; }
        .old { text-decoration: line-through; color: #666; font-size: 0.8rem; margin-right: 5px; }
        .social { font-size: 0.75rem; color: var(--text); margin-top: 5px; }
        .btn { display: block; text-align: center; border: 2px solid var(--yellow); padding: 12px; border-radius: 8px; color: var(--yellow); text-decoration: none; font-weight: bold; margin-top: 15px; }
        .whats { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: #fff; padding: 15px; border-radius: 50%; z-index: 100; }
    </style>
</head>
<body>
    <div class="app">
        <header><h1>🔥 OFERTAS RELÂMPAGO</h1></header>
        <div class="timer">⏳ Promoções acabam em: <span id="countdown">10:00</span></div>
        <div id="lista-produtos"></div>
        <script>
            const produtos = [
                ["Scanner Automotivo OBD2 Bluetooth", "59,90", "129,90", "https://i.imgur.com/8Qn7p7p.jpg", "MAIS VENDIDO"],
                ["Kit 10 Lâmpadas LED T10 Interno", "39,90", "89,90", "https://i.imgur.com/W2oZ8vR.jpg", "OFERTA"],
                ["Organizador Porta-Malas Flexível", "49,90", "99,90", "https://i.imgur.com/6S6zY2M.jpg", ""],
                ["Aspirador de Pó 12V Turbo", "79,90", "149,90", "https://i.imgur.com/K3VwG6O.jpg", "DESTAQUE"],
                ["Cera de Grafeno (Brilho e Proteção)", "44,90", "99,90", "https://i.imgur.com/mOIdrXm.jpg", ""],
                ["Suporte Celular Magnético Universal", "29,90", "69,90", "https://i.imgur.com/uGzZ4Zq.jpg", ""],
                ["Jogo de Capas para Banco (Preto)", "89,90", "199,90", "https://i.imgur.com/vHqLhXU.jpg", ""],
                ["Mini Compressor de Ar Digital", "99,90", "199,90", "https://i.imgur.com/E9yD6vV.jpg", "FRETE GRÁTIS"]
            ];
            const container = document.getElementById("lista-produtos");
            produtos.forEach((p) => {
                container.innerHTML += `
                <div class="card">
                    ${p[4] ? `<div class="badge">${p[4]}</div>` : ''}
                    <img src="${p[3]}" alt="${p[0]}">
                    <div class="card-body">
                        <div class="title">${p[0]}</div>
                        <div class="price-container"><span class="old">De R$ ${p[2]}</span><span class="price">Por R$ ${p[1]}</span></div>
                        <div class="social">🔥 ${Math.floor(Math.random()*20)+15} vendo agora</div>
                        <div class="social">⚠️ Restam ${Math.floor(Math.random()*5)+2} unidades</div>
                        <a href="https://wa.me/55SEUNUMERO?text=Quero o ${p[0]}" class="btn">COMPRAR AGORA</a>
                    </div>
                </div>`;
            });
            let time = 600;
            setInterval(() => {
                let m = Math.floor(time / 60); let s = time % 60;
                document.getElementById("countdown").innerText = m + ":" + (s < 10 ? "0" + s : s);
                if (time > 0) time--;
            }, 1000);
        </script>
    </div>
