<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Ofertas Automotivas | Máquina em Dia</title>

<style>
:root{
--bg:#050505;
--card:#121212;
--border:#252525;
--yellow:#ffcc00;
--text:#aaa;
--green:#00c853;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:sans-serif;
background:var(--bg);
color:#fff;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
min-height:100vh;
background:var(--card);
}

header{
text-align:center;
padding:20px;
border-bottom:1px solid var(--border);
}

header h1{
color:var(--yellow);
font-size:1.6rem;
}

.timer{
background:#000;
text-align:center;
padding:10px;
color:#ff4444;
font-weight:bold;
font-size:0.8rem;
}

.card{
background:#0c0c0c;
margin:10px;
border-radius:12px;
overflow:hidden;
border:1px solid var(--border);
position:relative;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:var(--green);
padding:4px 8px;
font-size:0.6rem;
border-radius:5px;
font-weight:bold;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.title{
font-size:0.9rem;
font-weight:bold;
margin-bottom:6px;
}

.price{
color:var(--yellow);
font-size:1rem;
}

.old{
text-decoration:line-through;
color:#666;
font-size:0.75rem;
}

.social{
font-size:0.7rem;
color:var(--text);
margin-top:3px;
}

.btn{
display:block;
text-align:center;
border:2px solid var(--yellow);
padding:10px;
border-radius:8px;
color:var(--yellow);
text-decoration:none;
font-weight:bold;
margin-top:8px;
}

.btn:hover{
background:var(--yellow);
color:#000;
}

.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:14px;
border-radius:50%;
text-decoration:none;
}
</style>
</head>

<body>

<div class="app">

<header>
<h1>🔥 OFERTAS RELÂMPAGO</h1>
</header>

<div class="timer">
⏳ Promoções acabam em: <span id="countdown">10:00</span>
</div>

<!-- PRODUTOS -->

<script>
const produtos = [
["Scanner OBD2 Profissional","59,90","129,90","https://images.unsplash.com/photo-1511919884226-fd3cad34687c"],
["Kit LED Interno","39,90","89,90","https://images.unsplash.com/photo-1503376780353-7e6692767b70"],
["Organizador Porta-Malas","49,90","99,90","https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2"],
["Aspirador Automotivo Turbo","79,90","149,90","https://images.unsplash.com/photo-1581578731548-c64695cc6952"],
["Cera de Grafeno","44,90","99,90","https://images.unsplash.com/photo-1613214150388-4f780b0d6b7e"],
["Suporte de Celular Veicular","29,90","69,90","https://images.unsplash.com/photo-1549921296-3a6b0a7c03b9"],
["Capa de Banco Universal","89,90","199,90","https://images.unsplash.com/photo-1552519507-da3b142c6e3d"],
["Mini Compressor Portátil","99,90","199,90","https://images.unsplash.com/photo-1581091870627-3f89d9c70d5b"]
];

const app = document.querySelector(".app");

produtos.forEach((p,i)=>{
const card = `
<div class="card">
${i==0?'<div class="badge">MAIS VENDIDO</div>':''}
<img src="${p[3]}">

<div class="card-body">
<div class="title">${p[0]}</div>
<div class="price">R$ ${p[1]}</div>
<div class="old">R$ ${p[2]}</div>

<div class="social">🔥 ${Math.floor(Math.random()*20)+5} pessoas vendo</div>
<div class="social">⚠️ Restam ${Math.floor(Math.random()*10)+1} unidades</div>
<div class="social">⭐ 4.${Math.floor(Math.random()*3)+7}/5 avaliações</div>

<a href="#" class="btn">COMPRAR AGORA</a>
</div>
</div>
`;
app.innerHTML += card;
});

// CONTADOR
let time=600;
setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("countdown").innerText =
m+":"+(s<10?"0"+s:s);
if(time>0)time--;
},1000);
</script>

</div>

<a href="https://wa.me/55SEUNUMERO?text=Quero entrar no grupo 🔥" class="whats">💬</a>

</body>
</html>
