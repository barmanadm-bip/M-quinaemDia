<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Ofertas Automotivas | Máquina em Dia</title>

<style>
:root {
--bg:#050505;
--card:#121212;
--border:#252525;
--yellow:#ffcc00;
--text:#aaa;
--green:#00c853;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, sans-serif;
background:var(--bg);
color:#fff;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
min-height:100vh;
background:var(--card);
padding-bottom:100px;
}

/* HEADER */
header{
text-align:center;
padding:20px;
border-bottom:1px solid var(--border);
background:#000;
}

header h1{
color:var(--yellow);
font-size:1.4rem;
}

/* TIMER */
.timer{
background:#1a0000;
text-align:center;
padding:10px;
color:#ff4444;
font-weight:bold;
}

/* CARD */
.card{
background:#1a1a1a;
margin:15px 12px;
border-radius:12px;
overflow:hidden;
border:1px solid var(--border);
position:relative;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:var(--green);
padding:5px 10px;
font-size:0.65rem;
border-radius:4px;
font-weight:bold;
z-index:10;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
background:#fff;
}

/* BODY */
.card-body{padding:15px;}

.title{
font-size:1rem;
font-weight:bold;
margin-bottom:8px;
}

.price-box{
margin:8px 0;
}

.old{
text-decoration:line-through;
color:#666;
font-size:0.8rem;
}

.price{
color:var(--yellow);
font-size:1.5rem;
font-weight:900;
display:block;
}

.social{
font-size:0.75rem;
color:var(--text);
margin-top:5px;
}

/* BOTÃO */
.btn{
display:block;
text-align:center;
background:var(--yellow);
color:#000;
padding:14px;
border-radius:8px;
font-weight:bold;
margin-top:12px;
text-decoration:none;
transition:0.2s;
}

.btn:hover{
transform:scale(1.03);
}

/* WHATS */
.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50%;
z-index:100;
}
</style>
</head>

<body>

<div class="app">

<header>
<h1>🔥 OFERTAS RELÂMPAGO</h1>
</header>

<div class="timer">
⏳ Promoções acabam em: <span id="countdown">10:00</span>
</div>

<div id="lista-produtos"></div>

<script>
const produtos = [
["Scanner Automotivo OBD2 Bluetooth","59,90","129,90","https://m.media-amazon.com/images/I/61K6xq+q5pL._AC_SL1500_.jpg","MAIS VENDIDO"],
["Kit LED Automotivo Interno","39,90","89,90","https://m.media-amazon.com/images/I/61s1XQ9oYkL._AC_SL1500_.jpg","OFERTA"],
["Organizador Porta-Malas","49,90","99,90","https://m.media-amazon.com/images/I/71N5rW8mGvL._AC_SL1500_.jpg",""],
["Aspirador Automotivo Turbo","79,90","149,90","https://m.media-amazon.com/images/I/61qQ9X3y9pL._AC_SL1500_.jpg","DESTAQUE"],
["Cera de Grafeno","44,90","99,90","https://m.media-amazon.com/images/I/71vPz6x8cTL._AC_SL1500_.jpg",""],
["Suporte Celular Veicular","29,90","69,90","https://m.media-amazon.com/images/I/61Z5h7bW1ML._AC_SL1500_.jpg",""],
["Capa de Banco Automotivo","89,90","199,90","https://m.media-amazon.com/images/I/71Hq2cL+2ML._AC_SL1500_.jpg",""],
["Mini Compressor de Ar","99,90","199,90","https://m.media-amazon.com/images/I/71M5h6YQ5zL._AC_SL1500_.jpg","FRETE GRÁTIS"]
];

const container = document.getElementById("lista-produtos");

produtos.forEach(p=>{
container.innerHTML += `
<div class="card">
${p[4] ? `<div class="badge">${p[4]}</div>` : ''}

<img src="${p[3]}" alt="${p[0]}">

<div class="card-body">
<div class="title">${p[0]}</div>

<div class="price-box">
<span class="old">De R$ ${p[2]}</span>
<span class="price">Por R$ ${p[1]}</span>
</div>

<div class="social">🔥 ${Math.floor(Math.random()*20)+15} pessoas vendo agora</div>
<div class="social">⚠️ Restam ${Math.floor(Math.random()*5)+2} unidades</div>
<div class="social">🚚 Envio rápido</div>

<a href="https://wa.me/55SEUNUMERO?text=Quero o ${p[0]}" class="btn">
COMPRAR AGORA
</a>

</div>
</div>
`;
});

// CONTADOR
let time=600;
setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("countdown").innerText =
m+":"+(s<10?"0"+s:s);
if(time>0)time--;
},1000);
</script>

</div>

<a href="https://wa.me/55SEUNUMERO" class="whats">💬</a>

</body>
</html>
